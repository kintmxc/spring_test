# Name
spring.application.name=spring_test
server.port=8081
server.servlet.session.timeout=7d
server.servlet.session.cookie.max-age=7d
server.servlet.session.cookie.http-only=true
# 本地开发（HTTP）使用宽松 Cookie 策略，便于会话联调
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.forward-headers-strategy=framework
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
app.cors.allowed-origin-patterns=*
# Logging
logging.level.com.example.spring_test.security=INFO
logging.level.org.springframework.web=INFO
# Data Source
# 数据库连接配置 - 本地数据库
spring.datasource.url=jdbc:mysql://localhost:3306/agri_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.spring_test.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

# SQL Init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql

# Upload
# 本地开发环境
app.upload.dir=${user.dir}/uploads
app.upload.base-url=http://localhost:8081
# 云服务器环境
# app.upload.dir=/var/www/uploads
# app.upload.base-url=https://8.137.160.86
app.upload.default-image=https://via.placeholder.com/150
spring.web.resources.static-locations=classpath:/static/,file:${app.upload.dir}/
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Security Configuration (TODO: Enable strict mode for production)
app.security.strict-mode=false
app.security.sms-verification.use-real-sms=false
app.security.sms-verification.mock-code=123456
app.security.password-validation.require-bcrypt-only=false
app.security.password-validation.min-length=6
app.security.file-upload.max-size-bytes=10485760
app.security.file-upload.allowed-extensions=.jpg,.jpeg,.png,.gif,.pdf,.doc,.docx
app.security.file-upload.validate-mime-type=false

# Druid
spring.datasource.druid.initial-size=10
spring.datasource.druid.min-idle=20
spring.datasource.druid.max-active=50
spring.datasource.druid.max-wait=5000
spring.datasource.druid.validation-query=SELECT 1
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-return=false
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000

# AI Configuration
ai.enabled=true
ai.provider=zhipu
ai.api-key=81e1eaaafab04099b92445b2151962c6.jzmF7NLdgsLheHMF
ai.model=glm-4
ai.base-url=https://open.bigmodel.cn/api/paas/v4
ai.timeout=30000
ai.max-tokens=1024
ai.temperature=0.7